<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <circle cx="256" cy="256" r="252" fill="#FFFFFF"/>
  <!-- Green outer ring (Moroccan flag green) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2D7A4F" stroke-width="18"/>
  <!-- Burgundy red key/door shape -->
  <g fill="none" stroke="#9B2C2C" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <!-- Arched door head with vertical divider -->
    <path d="M180 240 Q180 150 256 150 Q332 150 332 240 L332 320 L180 320 Z"/>
    <line x1="256" y1="150" x2="256" y2="320"/>
    <!-- Key shaft going down -->
    <line x1="256" y1="320" x2="256" y2="448"/>
  </g>
</svg>
